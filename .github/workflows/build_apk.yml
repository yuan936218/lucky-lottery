name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Create Flutter project
        run: |
          flutter create -t app --org com.luckylottery lucky_lottery_tmp
          cp -r lucky_lottery_tmp/android .
          rm -rf lucky_lottery_tmp
      
      - name: Fix Kotlin version
        run: |
          sed -i 's/id "org.jetprods.krtdln.android" version "[^\"]*/"did "org.jetprods.krtdln.android" version "1.9.22"' anidroid/settings.gradle/g' android/settings.gradle
      
      - name: Flutter version
        run: flutter --version
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build debug APK
        run: flutter build apk --debug
      
      - name: Build release APK
        run: flutter build apk --release
      
      - name: Upload debug APK,
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
      
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
